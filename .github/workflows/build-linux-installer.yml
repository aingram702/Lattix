name: Build Linux installer

# Produces the self-extracting Linux installer (Lattix-<ver>-<arch>.run):
# PyInstaller freezes the app (no Python needed on the target), then it's
# wrapped into a single executable installer. Runs on demand and on version
# tags; uploaded as an artifact and attached to the release on tags.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Lattix

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r installer/requirements-build.txt

      - name: Build app with PyInstaller
        run: pyinstaller --noconfirm installer/lattix.spec

      - name: Verify the frozen app exists
        run: test -e dist/Lattix/Lattix

      - name: Build self-extracting installer
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          case "$GITHUB_REF" in refs/tags/*) : ;; *) VERSION="1.1.0" ;; esac
          LATTIX_VERSION="$VERSION" sh installer/linux/make_selfextract.sh dist/Lattix

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: lattix-linux-installer
          path: Lattix/installer/linux/Output/*.run
          if-no-files-found: error

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Lattix/installer/linux/Output/*.run
