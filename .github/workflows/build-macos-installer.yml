name: Build macOS installer

# Produces the macOS disk image (Lattix-<ver>-<arch>.dmg): PyInstaller builds a
# standalone Lattix.app (no Python needed on the target), which is packaged into
# a drag-to-install .dmg. Runs on demand and on version tags; uploaded as an
# artifact and attached to the release on tags.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Lattix

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r installer/requirements-build.txt

      - name: Build app with PyInstaller
        run: pyinstaller --noconfirm installer/lattix.spec

      - name: Verify the app bundle exists
        run: test -d dist/Lattix.app

      - name: Build disk image
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          case "$GITHUB_REF" in refs/tags/*) : ;; *) VERSION="1.1.0" ;; esac
          LATTIX_VERSION="$VERSION" sh installer/macos/make_dmg.sh dist/Lattix.app

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: lattix-macos-installer
          path: Lattix/installer/macos/Output/*.dmg
          if-no-files-found: error

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Lattix/installer/macos/Output/*.dmg
